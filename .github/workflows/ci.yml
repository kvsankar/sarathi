name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: pyproject.toml

      - name: Sync
        run: uv sync --locked --all-groups

      - name: Ruff check
        run: uv run ruff check checkers tests

      - name: Ruff format check
        run: uv run ruff format --check checkers tests

      - name: Markdown check
        run: >
          uv run pymarkdown --enable-extensions front-matter,markdown-tables
          --set 'plugins.md024.siblings_only=$!true'
          -d md013 scan AGENTS.md prompts skills docs

      - name: Checker tests
        run: >
          uv run pytest -q --cov=checkers --cov-report=term-missing
          --cov-fail-under=80

      - name: Install browser test dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser layout tests
        run: npm run test:layout
